  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#111;color:#eee;margin:0;min-height:100vh;
    padding:1.5rem 1.25rem 3rem;
    display:flex;flex-direction:column;align-items:center;
  }
  h1{font-size:2rem;font-weight:700;margin:.5rem 0 1.75rem;text-align:center;font-family:'Averia Serif Libre', ui-serif, Georgia, serif;}
  .wrap{width:100%;max-width:420px;display:flex;flex-direction:column;gap:.9rem;}

  .pill{
    display:flex;align-items:center;justify-content:center;gap:.6rem;
    width:100%;min-height:64px;padding:.9rem 1.4rem;
    background:#eee;color:#111;
    border:none;border-radius:999px;
    font-size:1.05rem;font-weight:600;font-family:inherit;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .pill:active{background:#ccc;}
  .pill.secondary{
    background:transparent;color:#eee;border:1px solid #555;
  }
  .pill.secondary:active{background:#222;}
  .pill:disabled{opacity:.5;}

  input[type=file]{display:none;}

  .icon{width:1.4em;height:1.4em;flex-shrink:0;vertical-align:middle;}
  .status .icon{width:1.1em;height:1.1em;margin-right:.25em;}

  .panel{
    display:none;
    width:100%;max-width:420px;
    flex-direction:column;align-items:center;gap:1rem;
    margin-top:.5rem;
  }
  .panel.active{display:flex;}

  .preview{
    width:100%;max-height:60vh;object-fit:contain;
    border-radius:20px;border:1px solid #333;background:#000;
  }

  .status{font-size:.95rem;text-align:center;opacity:.85;min-height:1.2em;}
  .status.error{color:#ff8080;opacity:1;}
  .status.ok{color:#8fff9e;opacity:1;}

  .progress-track{
    width:100%;height:10px;border-radius:999px;background:#2a2a2a;overflow:hidden;
    display:none;
  }
  .progress-track.active{display:block;}
  .progress-bar{height:100%;width:0%;background:#eee;border-radius:999px;transition:width .15s ease;}

  .back{
    margin-top:.75rem;background:none;border:none;color:#888;
    font-size:.9rem;font-family:inherit;
    padding:.5rem;cursor:pointer;
    display:inline-flex;align-items:center;gap:.3rem;
  }
  .back span{text-decoration:underline;}

  .meta{margin-top:2rem;opacity:.35;font-size:.7rem;text-align:center;}

  .overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
    align-items:center;justify-content:center;padding:1.25rem;z-index:10;
  }
  .overlay.active{display:flex;}
  .overlay-box{
    width:100%;max-width:380px;background:#1a1a1a;border:1px solid #333;
    border-radius:24px;padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:.9rem;
  }
  .overlay-title{font-size:1.05rem;font-weight:600;text-align:center;margin:0 0 .25rem;}

  .field-label{font-size:.85rem;opacity:.75;margin:0 0 -.4rem;}
  .field-input{
    width:100%;min-height:48px;padding:.7rem 1rem;border-radius:14px;
    background:#1c1c1c;border:1px solid #444;color:#eee;
    font-size:1rem;font-family:inherit;
  }
  .field-input:focus{outline:none;border-color:#888;}
</style>
</head>
<body>

<h1>Agora</h1>

<div class="wrap" id="modeSelect">
  <button class="pill" id="btnAdd" type="button">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2 11V4.6C2 4.26863 2.26863 4 2.6 4H8.77805C8.92127 4 9.05977 4.05124 9.16852 4.14445L12.3315 6.85555C12.4402 6.94876 12.5787 7 12.722 7H21.4C21.7314 7 22 7.26863 22 7.6V11M2 11V19.4C2 19.7314 2.26863 20 2.6 20H21.4C21.7314 20 22 19.7314 22 19.4V11M2 11H22"/>
    </svg> Daten hinzufügen
  </button>
  <button class="pill" id="btnCamera" type="button">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2 19V9C2 7.89543 2.89543 7 4 7H4.5C5.12951 7 5.72229 6.70361 6.1 6.2L8.32 3.24C8.43331 3.08892 8.61115 3 8.8 3H15.2C15.3889 3 15.5667 3.08892 15.68 3.24L17.9 6.2C18.2777 6.70361 18.8705 7 19.5 7H20C21.1046 7 22 7.89543 22 9V19C22 20.1046 21.1046 21 20 21H4C2.89543 21 2 20.1046 2 19Z"/>
      <path d="M12 17C14.2091 17 16 15.2091 16 13C16 10.7909 14.2091 9 12 9C9.79086 9 8 10.7909 8 13C8 15.2091 9.79086 17 12 17Z"/>
    </svg> Foto machen
  </button>
  <button class="pill" id="btnThesis" type="button">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3V16M12 16L7.5 11.5M12 16L16.5 11.5"/>
      <path d="M3 17V19.4C3 20.2837 3.71634 21 4.6 21H19.4C20.2837 21 21 20.2837 21 19.4V17"/>
    </svg> Thesis Downloaden
  </button>

  <div class="status" id="quickStatus"></div>
  <div class="progress-track" id="quickProgress"><div class="progress-bar" id="quickProgressBar"></div></div>
</div>

<div class="panel" id="cameraPanel">
  <img class="preview" id="cameraPreview" alt="Vorschau">
  <div class="field-label" for="inputPhotoName">Dateiname (optional)</div>
  <input class="field-input" type="text" id="inputPhotoName" placeholder="z.B. skizze-01" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button class="pill" id="btnAddPhoto" type="button">Foto zur Agora hinzufügen</button>
  <button class="pill secondary" id="btnCancelPhoto" type="button">Abbrechen</button>
  <div class="status" id="cameraStatus"></div>
  <div class="progress-track" id="cameraProgress"><div class="progress-bar" id="cameraProgressBar"></div></div>
</div>


<div class="overlay" id="thesisOverlay">
  <div class="overlay-box">
    <p class="overlay-title">Thesis herunterladen</p>
    <a class="pill" id="linkThesisPdf" href="/thesis/pdf" download>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 3.6V20.4C7 20.7314 7.26863 21 7.6 21H16.4C16.7314 21 17 20.7314 17 20.4V8.328C17 8.1633 16.9192 8.00902 16.7822 7.89972L12.4822 3.57172C12.3688 3.46243 12.2185 3.4 12.06 3.4H7.6C7.26863 3.4 7 3.6 7 3.6Z"/>
      </svg> PDF
    </a>
    <a class="pill" id="linkThesisEpub" href="/thesis/epub" download>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 4.5C4 3.67157 4.67157 3 5.5 3H18.5C19.3284 3 20 3.67157 20 4.5V19.5C20 20.3284 19.3284 21 18.5 21H5.5C4.67157 21 4 20.3284 4 19.5V4.5Z"/>
        <path d="M12 3V21"/>
      </svg> EPUB
    </a>
    <button class="pill secondary" id="btnThesisClose" type="button">Schließen</button>
  </div>
</div>

<button class="back" id="btnBack" type="button" style="display:none;">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6L9 12L15 18"/></svg>
  <span>Zurück zur Auswahl</span>
</button>

<input type="file" id="inputAdd" multiple>
<input type="file" id="inputCamera" accept="image/*" capture="environment">


<script>
(function(){
  var modeSelect = document.getElementById('modeSelect');
  var cameraPanel = document.getElementById('cameraPanel');
  var btnBack = document.getElementById('btnBack');

  var inputAdd = document.getElementById('inputAdd');
  var inputCamera = document.getElementById('inputCamera');
  var inputPhotoName = document.getElementById('inputPhotoName');

  var thesisOverlay = document.getElementById('thesisOverlay');

  var cameraPreview = document.getElementById('cameraPreview');
  var previewUrl = null;
  var pendingCameraFile = null;

  var quickStatus = document.getElementById('quickStatus');
  var quickProgress = document.getElementById('quickProgress');
  var quickProgressBar = document.getElementById('quickProgressBar');

  var cameraStatus = document.getElementById('cameraStatus');
  var cameraProgress = document.getElementById('cameraProgress');
  var cameraProgressBar = document.getElementById('cameraProgressBar');

  function showModeSelect(){
    modeSelect.style.display = 'flex';
    cameraPanel.classList.remove('active');
    btnBack.style.display = 'none';
    quickStatus.textContent = '';
    quickStatus.className = 'status';
    quickProgress.classList.remove('active');
    quickProgressBar.style.width = '0%';
  }

  function showCameraPanel(){
    modeSelect.style.display = 'none';
    cameraPanel.classList.add('active');
    btnBack.style.display = 'inline-block';
    cameraStatus.textContent = '';
    cameraStatus.className = 'status';
    cameraProgress.classList.remove('active');
    cameraProgressBar.style.width = '0%';
  }

  document.getElementById('btnAdd').addEventListener('click', function(){
    inputAdd.click();
  });
  document.getElementById('btnCamera').addEventListener('click', function(){
    inputCamera.click();
  });
  document.getElementById('btnThesis').addEventListener('click', function(){
    thesisOverlay.classList.add('active');
  });
  document.getElementById('btnThesisClose').addEventListener('click', function(){
    thesisOverlay.classList.remove('active');
  });

  inputAdd.addEventListener('change', function(){
    if(inputAdd.files && inputAdd.files.length){
      uploadFiles(inputAdd.files, quickStatus, quickProgress, quickProgressBar, null, function(){
        inputAdd.value = '';
      });
    }
  });

  inputCamera.addEventListener('change', function(){
    if(!inputCamera.files || !inputCamera.files.length) return;
    pendingCameraFile = inputCamera.files[0];
    if(previewUrl) URL.revokeObjectURL(previewUrl);
    previewUrl = URL.createObjectURL(pendingCameraFile);
    cameraPreview.src = previewUrl;
    showCameraPanel();
  });

  function resetCamera(){
    if(previewUrl){
      URL.revokeObjectURL(previewUrl);
      previewUrl = null;
    }
    cameraPreview.src = '';
    pendingCameraFile = null;
    inputCamera.value = '';
    inputPhotoName.value = '';
  }

  document.getElementById('btnCancelPhoto').addEventListener('click', function(){
    resetCamera();
    showModeSelect();
  });

  document.getElementById('btnAddPhoto').addEventListener('click', function(){
    if(!pendingCameraFile) return;
    var file = pendingCameraFile;
    var name = inputPhotoName.value.trim();
    if(name && !/\.[a-z0-9]+$/i.test(name)){
      name += '.jpg';
    }
    uploadFiles([file], cameraStatus, cameraProgress, cameraProgressBar, name || null, function(){
      resetCamera();
    });
  });

  btnBack.addEventListener('click', function(){
    resetCamera();
    showModeSelect();
  });

  function uploadFiles(fileList, statusEl, progressTrack, progressBar, name, onSettled){
    var formData = new FormData();
    for(var i=0;i<fileList.length;i++){
      formData.append('file', fileList[i]);
    }
    if(name){
      formData.append('name', name);
    }

    statusEl.textContent = 'Wird hochgeladen…';
    statusEl.className = 'status';
    progressTrack.classList.add('active');
    progressBar.style.width = '0%';

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/up/upload');

    xhr.upload.addEventListener('progress', function(e){
      if(e.lengthComputable){
        var pct = Math.round((e.loaded / e.total) * 100);
        progressBar.style.width = pct + '%';
      }
    });

    xhr.addEventListener('load', function(){
      progressTrack.classList.remove('active');
      var ok = false;
      var result = null;
      try{ result = JSON.parse(xhr.responseText); }catch(e){}

      if(xhr.status >= 200 && xhr.status < 300 && result && result.ok){
        ok = true;
      }

      if(ok){
        var count = (result.uploaded || []).length;
        statusEl.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 13L9 17L19 7"/></svg>Hochgeladen (' + count + (count === 1 ? ' Datei' : ' Dateien') + ')';
        statusEl.className = 'status ok';
        if(onSettled) onSettled();
        setTimeout(function(){
          if(cameraPanel.classList.contains('active')){
            showModeSelect();
          }
        }, 1200);
      } else {
        var msg = 'Upload fehlgeschlagen. Bitte erneut versuchen.';
        if(result && result.failed && result.failed.length){
          msg = 'Fehlgeschlagen: ' + result.failed.map(function(f){ return f.name; }).join(', ');
        }
        statusEl.textContent = msg;
        statusEl.className = 'status error';
      }
    });

    xhr.addEventListener('error', function(){
      progressTrack.classList.remove('active');
      statusEl.textContent = 'Keine Verbindung zum Server. Bitte erneut versuchen.';
      statusEl.className = 'status error';
    });

    xhr.send(formData);
  }
})();
</script>

</body>
</html>
